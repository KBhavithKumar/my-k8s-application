apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-node-app
  template:
    metadata:
      labels:
        app: my-node-app
    spec:
      containers:
      - name: my-node-app
        image: rishigangadhari/my-node-app:latest  # your Docker Hub image
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
