apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-node-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-node-application
  template:
    metadata:
      labels:
        app: my-node-application
    spec:
      containers:
      - name: my-node-application
        image: sanjayamaravadi/my-node-application:latest  # your Docker Hub image
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
